name: Feature request
description: Suggest an idea or improvement
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement. Please describe the problem you're trying to solve — not just the solution.

  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What is the limitation or gap you're running into?
      placeholder: "When I try to ... I can't ... because ..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to see added or changed?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Are there workarounds you've tried? Other libraries or approaches?

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Kubernetes version, use-case, related issues, etc.
