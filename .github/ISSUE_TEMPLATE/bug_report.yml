name: Bug report
description: Something isn't working as expected
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report. Please fill in as much detail as possible.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Minimal steps that reliably trigger the bug.
      placeholder: |
        1. Create a V1Deployment with ...
        2. Call CreateStrategicPatch(...)
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: repro-code
    attributes:
      label: Minimal repro (code)
      description: A self-contained C# snippet that demonstrates the issue.
      render: csharp

  - type: input
    id: dotnet-version
    attributes:
      label: .NET version
      placeholder: "e.g. 10.0.100"
    validations:
      required: true

  - type: input
    id: package-version
    attributes:
      label: KubernetesClient.StrategicPatch version
      placeholder: "e.g. 0.1.0-alpha"
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Anything else that might help (stack trace, logs, related issues).
